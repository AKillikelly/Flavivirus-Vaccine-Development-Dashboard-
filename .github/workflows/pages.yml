name: Automated refresh and deploy flavivirus dashboard

on:
  push:
    branches: ["main"]
  workflow_dispatch:
  schedule:
    # Weekly refresh every Monday at 06:17 in Montreal time.
    - cron: "17 6 * * 1"
      timezone: "America/Montreal"

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt

      - name: Fetch and classify pipeline data
        run: python scripts/fetch_pipeline.py

      - name: Build static dashboard
        run: python scripts/build_dashboard.py

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Commit generated snapshots
        if: ${{ vars.COMMIT_GENERATED_DATA == 'true' }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/pipeline.csv data/raw reports/automation_summary.md public/flavivirus_vaccine_development_pipeline_data.csv public/automation_summary.md public/index.html
          git diff --cached --quiet || git commit -m "Update generated flavivirus dashboard data"
          git push

      - name: Upload GitHub Pages artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: public

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
